- id: full_turn_remote_work
  category: full_turn
  input: Research the main benefits and risks of remote work for software engineering teams, and provide a balanced recommendation.
  approval_mode: auto_approve
  expectations:
    must_interrupt_for_approval: true
    required_tools_any_order:
      - tavily_search
    forbidden_tools: []
    required_files:
      - /research_request.md
      - /research_brief.md
      - /research_verification.md
      - /final_report.md
    verification_status_allowed:
      - COMPLETE
      - NEEDS_MINOR_ADDITIONS
    final_report:
      min_headings: 3
      min_citations: 2
      must_answer_user_question: true
      report_must_include:
        - recommendation
    findings:
      min_files: 1
    budgets:
      max_search_calls: 15
  judge:
    enabled: true
    min_score: 3

